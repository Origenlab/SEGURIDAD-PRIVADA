name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "."

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build with Astro
        run: npm run build
      # Huella del commit DENTRO del artefacto publicado. El gate final se la
      # pide al dominio: si no la devuelve, el deploy no llego a produccion.
      - name: Sellar build-id
        run: echo "${{ github.sha }}" > dist/build-id.txt
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # --- GATE REAL: verifica el DOMINIO, no el build ---
      # Un deploy verde solo prueba que el artefacto se subio. NO prueba que el
      # visitante lo vea: el DNS puede apuntar a otro origen (p.ej. un GitHub
      # Pages congelado detras del proxy de Cloudflare).
      - name: Verificar que el dominio sirve este commit
        run: |
          DOMINIO="seguridad-privada.com.mx"
          for i in $(seq 1 12); do
            sleep 10
            LIVE=$(curl -fsSL --max-time 15 "https://$DOMINIO/build-id.txt?cb=${RANDOM}${i}" 2>/dev/null | tr -d '[:space:]' || echo "")
            if [ "$LIVE" = "${{ github.sha }}" ]; then
              echo "OK - $DOMINIO sirve ${GITHUB_SHA:0:12}"
              exit 0
            fi
            echo "intento $i/12 - dominio devuelve '${LIVE:0:12}', esperado '${GITHUB_SHA:0:12}'"
          done
          echo "::error::$DOMINIO NO sirve este build tras 2 min. Deploy verde pero el dominio apunta a otro origen (revisar custom domain del proyecto Pages, DNS de la zona, GitHub Pages activo)."
          exit 1
