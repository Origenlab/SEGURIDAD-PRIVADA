# PUBLISHER UNICO = Cloudflare Pages Git integration (proyecto seguridad-privada-web).
# Este workflow NO deploya: solo verifica que el dominio sirva el commit
# que CF construyo. GH Pages quedo DESHABILITADO (2026-07-20) — no revivirlo:
# un dominio = un publisher.
name: Gate de deploy (CF Git integration)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      # --- GATE REAL: verifica el DOMINIO, no el build ---
      # CF Pages construye este mismo commit por Git integration; le damos
      # hasta 8 min para terminar y publicar.
      - name: Verificar que el dominio sirve este commit
        run: |
          DOMINIO="seguridad-privada.com.mx"
          for i in $(seq 1 32); do
            sleep 15
            LIVE=$(curl -fsSL --max-time 15 "https://$DOMINIO/build-id.txt?cb=${RANDOM}${i}" 2>/dev/null | tr -d '[:space:]' || echo "")
            if [ "$LIVE" = "${{ github.sha }}" ]; then
              echo "OK - $DOMINIO sirve ${GITHUB_SHA:0:12}"
              exit 0
            fi
            echo "intento $i/32 - dominio devuelve '${LIVE:0:12}', esperado '${GITHUB_SHA:0:12}'"
          done
          echo "::error::$DOMINIO NO sirve este build tras 8 min. Revisar el build de CF Pages (proyecto seguridad-privada-web) en el dashboard."
          exit 1
